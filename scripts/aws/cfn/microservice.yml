AWSTemplateFormatVersion: 2010-09-09
Description: 'Example microservice deploy'


Parameters:
  ProjectName:
    Type: String
    Description: 'Usually pn can be pnXYZ where XYZ are the feature number, useful to create
      experimental environments without crash official development environment'
  
  CorsAllowedDomains:
    Type: String
    Description: 'Comma separated list of domains allowed to make cross origin request'

  # Instance parameters
  # 256 (.25 vCPU) - Available memory values: 0.5GB, 1GB, 2GB
  # 512 (.5 vCPU) - Available memory values: 1GB, 2GB, 3GB, 4GB
  # 1024 (1 vCPU) - Available memory values: 2GB, 3GB, 4GB, 5GB, 6GB, 7GB, 8GB
  # 2048 (2 vCPU) - Available memory values: Between 4GB and 16GB in 1GB increments
  # 4096 (4 vCPU) - Available memory values: Between 8GB and 30GB in 1GB increments
  CpuValue:
    Type: Number
    Default: 1024
    Description: Fargate virtual CPU quantity 1024 equals one vCPU

  # 0.5GB, 1GB, 2GB - Available cpu values: 256 (.25 vCPU)
  # 1GB, 2GB, 3GB, 4GB - Available cpu values: 512 (.5 vCPU)
  # 2GB, 3GB, 4GB, 5GB, 6GB, 7GB, 8GB - Available cpu values: 1024 (1 vCPU)
  # Between 4GB and 16GB in 1GB increments - Available cpu values: 2048 (2 vCPU)
  # Between 8GB and 30GB in 1GB increments - Available cpu values: 4096 (4 vCPU)
  MemoryAmount:
    Type: String
    Default: 2GB
    Description: memory amount reserved to the task pod.
    AllowedValues: [ 2GB, 4GB, 6GB, 8GB ]

  JavaToolOptions:
    Type: String
    Description: 'System properties and parameters for the JVM'
    Default: '-XX:MaxDirectMemorySize=128M'

  ContainerImageUri:
    Type: String
    Description: 'Exact container image URI with full repository and image digest'

  MicroserviceNumber:
    Type: Number
    Description: 'Disambiguation useful for load balancer rules'

  TemplateBucketBaseUrl:
    Type: String
    Description: 'The S3 bucket from which to fetch the templates used by this stack.'

  SandboxSafeStorageBaseUrl:
     Type: String
     Description: 'Url to the SafeStorage microservice'

  ECSClusterName:
    Type: String
    Description: 'The name of the ECS cluster where the microservice is going to be deployed'

  SubnetsIds:
    Type: String
    Description: 'subnets ids comma separated list. Where to deploy the microservice'

  VpcEgressSubnetsIds:
    Type: String
    Description: subnets where to install PN-CORE

  VpcId:
    Type: String
    Description: 'VpcId where the microservice is going to be deployed'
  
  EcsDefaultSecurityGroup:
    Type: String
    Description: 'Default security group required by infrastructure'

  ApplicationLoadBalancerDomain:
    Type: String
    Description: 'Base URL of the load balancer where the service is going to be reachable'
    Default: ''

  ApplicationLoadBalancerListenerArn:
    Type: String
    Description: 'Load balancer listener where HTTP endpoints is going to be registered'

  AlarmSNSTopicArn:
    Type: String
    Description: ARN of alarm topic

  Version:
    Type: String
    Description: 'keep track of used projects commitIds'

  PnCoreEventBusName:
    Type: String
    Description: "Name of the event bus used to redirect events from external channel to core services"

  PnConfInfoEventBusName:
    Type: String
    Description: "Name of the event bus used to redirect events from external channel to conf services"

  ExternalChannels2PaperChannelQueueName:
    Type: String
    Description: 'Push external-channel messages from this Queue to paper channel'

  ExternalChannels2PaperChannelQueueARN:
    Type: String
    Description: 'Push external-channel messages from this Queue to paper channel'

  InternalQueueName:
    Type: String
    Description: 'Send and pull notification progress th this queue'

  InternalQueueARN:
    Type: String
    Description: 'Send and pull notification progress th this queue'

  MockOcrInputsQueueName:
    Type: String
    Description: 'queue name for mock of ocr'

  MockOcrInputsQueueARN:
    Type: String
    Description: 'queue ARN for mock of ocr'

  NotificationProgressDynamoTableName:
    Type: String
    Description: 'Name of dynamodb table containing Notification Progress for mock'
    Default: 'pn-ExtChannels'

  NotificationProgressDynamoTableArn:
    Type: String
    Description: 'ARN of dynamodb table containing Notification Progress for mock'

  VerificationCodeTableDynamoTableArn:
    Type: String
    Description: 'ARN of dynamodb table containing Verification Code for mock'

  VerificationCodeTableDynamoTableName:
    Type: String
    Description: 'Name of dynamodb table containing Verification Code for mock'
    Default: 'pn-VerificationCode'
  MockEcReceivedMessageTableDynamoTableArn:
    Type: String
    Description: 'ARN of dynamodb table containing requests'

  MockEcReceivedMessageTableDynamoTableName:
    Type: String
    Description: 'Name of dynamodb table containing requests'

  # OpenApi Bucket params
  MicroserviceBucketName:
    Type: String
    Default: ''
    Description: 'Name of the bucket where the microservice files are copied during deploy'

  MicroserviceBucketBaseKey:
    Type: String
    Default: ''
    Description: 'Base key of the microservice in the s3 bucket'

  UseDynamodb:
    Type: String
    Description: 'True if you choose dynamodb as storage, false for in-memory storage'
    AllowedValues:
      - true
      - false
    Default: false

  CacheExpireDays:
    Type: String
    Description: 'Cache expire in days'

  CacheMaxSize:
    Type: String
    Description: 'Cache max size'

  JobCronExpression:
    Type: String
    Description: 'Cron Expression of scheduler to read requests from Database'

  CacheExpSsmMinutes:
    Type: String
    Description: 'Cache expiration for SSM Parameter Store'
    Default: "5"

  PnAddressManagerBaseUrl:
    Type: String
    Description: 'Address Manager base url'
    Default: ''

  PnAddressManagerCallbackAfterMinutes:
    Type: String
    Description: 'Address Manager Callback delay'
    Default: '0'

  OcrOutputsQueueName:
    Type: String
    Description: 'Ocr output queue name'

  OcrOutputsQueueARN:
    Type: String
    Description: 'Ocr output queue ARN'

  CoreAccountId:
    Type: String
    Description: 'Ocr output queue ARN'
    Default: ''

  MockSequenceParameterNames:
    Type: String
    Description: 'Lista nomi parameter store del mock'

  StartReworkRequestLambdaName:
    Type: String
    Description: "StartReworkRequestLambdaName"

  StartReworkRequestLambdaRuntime:
    Type: String
    Default: nodejs24.x
    Description: Runtime of the DataIndexer Lambda.

  StartReworkRequestLambdaTimeout:
    Type: Number
    Default: 30
    Description: Timeout StartReworkRequest Lambda.

  StartReworkRequestLambdaMemorySize:
    Type: Number
    Default: 512
    Description: Memory size StartReworkRequest Lambda.

  EnvironmentName:
    Type: String
    Description: 'Evn name'
    Default: 'core'

  EnvironmentType:
    Type: String
    Description: 'Evn type'

  ExternalChannelsToStartReworkRequestLambdaQueueARN:
    Type: String
    Description: 'ExternalChannelsStartRework queue ARN'

  ExternalChannelsToStartReworkRequestLambdaQueueURL:
    Type: String
    Description: 'ExternalChannelsStartRework queue URL'

  PnCoreTargetEventBusArn:
    Type: String
    Description: 'ARN del Event Bus target in account Core'
    Default: ''

Conditions:
  IsNotProdAccount: !Not [ !Equals [!Ref EnvironmentType, prod ] ]
  IsCoreAccount: !Equals [ !Ref EnvironmentName , 'core' ]
  IsConfinfoAccount: !Equals [ !Ref EnvironmentName , 'confinfo' ]
  IsCoreAndNotProd: !And
    - !Condition IsCoreAccount
    - !Condition IsNotProdAccount
  IsConfinfoAndNotProd: !And
    - !Condition IsConfinfoAccount
    - !Condition IsNotProdAccount

Resources:

  # PN-External-Channels microservice
  ExternalChannelsMicroservice:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/ecs-service.yaml"
      Parameters:
        MicroServiceUniqueName: !Sub '${ProjectName}-external-channels'
        CpuValue: !Ref CpuValue
        MemoryAmount: !Ref MemoryAmount
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn
        ContainerImageURI: !Sub '${ContainerImageUri}'
        ContainerEnvEntry1: !Sub 'AWS_REGIONCODE=${AWS::Region}'
        ContainerEnvEntry2: !Sub 'CORS_ALLOWED_DOMAINS=${CorsAllowedDomains}'
        ContainerEnvEntry3: !Sub 'PN_EXTERNALCHANNELS_COREEVENTBUSNAME=${PnCoreEventBusName}'
        ContainerEnvEntry4: !Sub 'PN_EXTERNALCHANNELS_SAFESTORAGEBASEURL=${SandboxSafeStorageBaseUrl}'
        ContainerEnvEntry5: !Sub 'PN_EXTERNALCHANNELS_CACHEEXPIREAFTERDAYS=${CacheExpireDays}'
        ContainerEnvEntry6: !Sub 'PN_EXTERNALCHANNELS_CACHEMAXSIZE=${CacheMaxSize}'
        ContainerEnvEntry7: !Sub 'JOB_CRON_EXPRESSION=${JobCronExpression}'
        ContainerEnvEntry8: !Sub 'PN_EXTERNALCHANNELS_TOPICS_TOPAPERCHANNEL=${ExternalChannels2PaperChannelQueueName}'
        ContainerEnvEntry9: !Sub 'PN_EXTERNALCHANNELS_USEDYNAMODB=${UseDynamodb}'
        ContainerEnvEntry10: !Sub 'PN_EXTERNALCHANNELS_TABLENAME=${NotificationProgressDynamoTableName}'
        ContainerEnvEntry11: !Sub 'PN_EXTERNALCHANNELS_VERIFICATIONCODETABLENAME=${VerificationCodeTableDynamoTableName}'
        ContainerEnvEntry12: !Sub 'PN_EXTERNALCHANNELS_TOPICS_TOINTERNAL=${InternalQueueName}'
        ContainerEnvEntry13: !Sub 'SPRING_CLOUD_FUNCTIONROUTER_QUEUES_LIST=${InternalQueueName},${MockOcrInputsQueueName}'
        ContainerEnvEntry14: !Sub 'PN_EXTERNALCHANNELS_CACHEEXPSSMMINUTES=${CacheExpSsmMinutes}'
        ContainerEnvEntry15: !Sub 'PN_EXTERNALCHANNELS_ADDRESSMANAGERBASEURL=${PnAddressManagerBaseUrl}'
        ContainerEnvEntry16: !Sub 'PN_EXTERNALCHANNELS_ADDRESSMANAGERCALLBACKAFTERMINUTES=${PnAddressManagerCallbackAfterMinutes}'
        ContainerEnvEntry17: !Sub 'PN_EXTERNALCHANNELS_RECEIVEDMESSAGETABLENAME=${MockEcReceivedMessageTableDynamoTableName}'
        #Per il mock consolidatore la variabile è stata volutamente impostata alla coda interna, in modo da evitare errori di deploy
        ContainerEnvEntry18: !Sub 'PN_EXTERNALCHANNELS_TOPICS_OCROUTPUTS=${OcrOutputsQueueName}'
        ContainerEnvEntry19: !Sub 'PN_EXTERNALCHANNELS_TOPICS_OCRINPUTS=${MockOcrInputsQueueName}'
        ContainerEnvEntry20: !Sub 'PN_EXTERNALCHANNELS_MOCKSEQUENCEPARAMETERNAMES=${MockSequenceParameterNames}'
        ContainerEnvEntry21: !Sub 'PN_EXTERNALCHANNELS_CONFINFOEVENTBUSNAME=${PnConfInfoEventBusName}'
        ContainerSecret1: !Sub 'PN_EXTERNALCHANNELS_EXTCHANNELWEBHOOKAPIKEY=arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pn-ExternalChannels-Secrets:ExternalChannelApiKey:AWSCURRENT:'
        MicroServiceSecretPrefix: pn-ExternalChannels-Secrets
        JavaToolOptions: !Ref JavaToolOptions
        MappedPaths: '/external-channels/*,/historical/*,/progress-event/*,/piattaforma-notifiche-ingress/*,/send-normalizzatore-ingress/*'
        ECSClusterName: !Ref ECSClusterName
        Subnets: !Ref VpcEgressSubnetsIds
        VpcId: !Ref VpcId
        EcsDefaultSecurityGroup: !Ref EcsDefaultSecurityGroup
        LoadBalancerListenerArn: !Ref ApplicationLoadBalancerListenerArn
        LoadbalancerRulePriority: !Ref MicroserviceNumber
        TaskRoleManagedPolicyArn: !Ref ExternalChannelsMicroserviceTaskManagedPolicy
        LogAlarmStrategyV1: "-"

  ExternalChannelsMicroserviceTaskManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - sqs:ChangeMessageVisibility
              - sqs:ChangeMessageVisibilityBatch
              - sqs:DeleteMessage
              - sqs:DeleteMessageBatch
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
              - sqs:ReceiveMessage
              - sqs:SendMessage
              - sqs:SendMessageBatch
            Resource:
              - !Ref ExternalChannels2PaperChannelQueueARN
              - !Ref InternalQueueARN
              - !Ref MockOcrInputsQueueARN
              - !Ref OcrOutputsQueueARN
          - Effect: Allow
            Action:
              - events:PutEvents
            Resource:
              - !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${PnCoreEventBusName}'
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
            Resource:
              - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/MapExternalChannelMockSequence*'
              - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/MapExternalChannelMockServiceIdEndpoint'
          - Effect: Allow
            Action:
              - 'dynamodb:GetItem'
              - 'dynamodb:Query'
              - 'dynamodb:PutItem'
              - 'dynamodb:DeleteItem'
              - 'dynamodb:UpdateItem'
              - 'dynamodb:Scan'
            Resource:
              - !Sub "${NotificationProgressDynamoTableArn}"
              - !Sub "${VerificationCodeTableDynamoTableArn}"
              - !Sub "${MockEcReceivedMessageTableDynamoTableArn}"
              - !Sub "${MockEcReceivedMessageTableDynamoTableArn}/*"

  StartReworkRequestLambdaSecGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsCoreAndNotProd
    Properties:
      GroupDescription: !Sub '${StartReworkRequestLambdaName}-sec-group'
      VpcId: !Ref VpcId

  StartReworkRequestLambda:
    Type: AWS::Lambda::Function
    Condition: IsCoreAndNotProd
    Properties:
      FunctionName: !Ref StartReworkRequestLambdaName
      Runtime: !Ref StartReworkRequestLambdaRuntime
      Handler: "index.handler"
      Code:
        S3Bucket: !Ref MicroserviceBucketName
        S3Key: !Sub "${MicroserviceBucketBaseKey}/functions_zip/startReworkRequestLambda.zip"
      Role: !GetAtt StartReworkRequestLambdaRole.Arn
      Environment:
        Variables:
          REGION: !Sub '${AWS::Region}'
          DELIVERYPUSH_BASEURL: !Sub 'http://${ApplicationLoadBalancerDomain}:8080/delivery-push-private/v1'
      TracingConfig:
        Mode: Active
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:339249233099:layer:LambdaInsightsExtension:13"
      Timeout: !Ref StartReworkRequestLambdaTimeout
      MemorySize: !Ref StartReworkRequestLambdaMemorySize
      VpcConfig:
        SubnetIds: !Split [ ",", !Ref VpcEgressSubnetsIds ]
        SecurityGroupIds:
          - !GetAtt StartReworkRequestLambdaSecGroup.GroupId


  # Lambda function role
  StartReworkRequestLambdaRole:
    Type: AWS::IAM::Role
    Condition: IsCoreAndNotProd
    Properties:
      RoleName: !Sub '${ProjectName}-StartReworkRequestLambdaRole'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  StartReworkRequestLambdaPolicy:
    Type: AWS::IAM::Policy
    Condition: IsCoreAndNotProd
    Properties:
      PolicyName: !Sub ${ProjectName}-StartReworkRequestLambdaPolicy
      Roles:
        - !Ref StartReworkRequestLambdaRole
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - sqs:ChangeMessageVisibility
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:ReceiveMessage
            Resource:
              - !Ref ExternalChannelsToStartReworkRequestLambdaQueueARN


  PnCoreEventBusToExtChStartReworkLambda:
    Type: AWS::Events::Rule
    Condition: IsCoreAndNotProd
    Properties:
      Description: Route ExternalChannel Events to StartReworkRequestLambda
      RoleArn: !GetAtt "EventBusEnqueueRole.Arn"
      EventBusName: !Ref PnCoreEventBusName
      EventPattern:
        detail-type: [ "ExternalChannelReworkEvent" ]
      Targets:
        - Arn: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:PnCoreEventBusMatchedEventLogger
          Id: !Sub ${ProjectName}-Logger-ExtChToDeliveryPush
          InputTransformer:
            InputPathsMap:
              "timestamp": "$.time"
            InputTemplate: |
              {
                  "timestamp": <timestamp>,
                  "ruleArn": <aws.events.rule-arn>,
                  "ruleName": <aws.events.rule-name>,
                  "ingestionTime": <aws.events.event.ingestion-time>,
                  "originalEvent": <aws.events.event.json>
              }
        - Id: !Sub '${ProjectName}-ExternalChannelsToStartReworkRequest'
          Arn: !Ref ExternalChannelsToStartReworkRequestLambdaQueueARN
          InputPath: $.detail
          DeadLetterConfig:
            Arn: !Sub arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:pn-CoreEventBus-DLQ

  # IAM Role for EventBridge rule to forward events to Core EventBus (cross-account)
  PnEcRoleForwardToCore:
    Type: AWS::IAM::Role
    Condition: IsConfinfoAndNotProd
    Properties:
      RoleName: !Sub '${ProjectName}-ext-channels-forward-to-core-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: PutEventsOnCoreEventBus
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'events:PutEvents'
                Resource: !Sub arn:aws:events:${AWS::Region}:${CoreAccountId}:event-bus/${PnCoreEventBusName}

  # EventBridge Rule on pn-ConfinfoEventBus forwarding to Core EventBus
  PnEcEventRuleForwardToCore:
    Type: AWS::Events::Rule
    Condition: IsConfinfoAndNotProd
    Properties:
      EventBusName: !Ref PnConfInfoEventBusName
      Description: 'Rule forwarding External Channels events from Confinfo EventBus to Core EventBus'
      EventPattern:
        source:
          - 'EXTERNAL CHANNELS RESTART'
        account:
          - !Ref AWS::AccountId
        region:
          - !Ref AWS::Region
      State: 'ENABLED'
      Targets:
        - Arn: !Sub arn:aws:events:${AWS::Region}:${CoreAccountId}:event-bus/${PnCoreEventBusName}
          Id: 'PnExternalChannelsForwardToCoreTarget'
          RoleArn: !GetAtt PnEcRoleForwardToCore.Arn
          DeadLetterConfig:
            Arn: !Sub arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:pn-ConfinfoEventBus-DLQ


  EventBusEnqueueRole:
    Type: AWS::IAM::Role
    Condition: IsCoreAndNotProd
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
        Version: '2012-10-17'
      Policies:
        - PolicyName: !Sub ${ProjectName}-external-channels-eventBusRuleLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: invokeLambda
                Action:
                  - lambda:InvokeFunction
                Effect: Allow
                Resource:
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:PnCoreEventBusMatchedEventLogger
              - Sid: putEvents
                Action:
                  - sqs:ChangeMessageVisibility
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                  - sqs:SendMessage
                Effect: Allow
                Resource:
                  - !Ref ExternalChannelsToStartReworkRequestLambdaQueueARN

  StartReworkRequestLambdaEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Condition: IsCoreAndNotProd
    Properties:
      Enabled: true
      EventSourceArn: !Ref ExternalChannelsToStartReworkRequestLambdaQueueARN
      BatchSize: 1
      MaximumBatchingWindowInSeconds: 0
      FunctionName: !GetAtt StartReworkRequestLambda.Arn

  ExternalChannelsToStartReworkRequestLambdaQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Condition: IsCoreAndNotProd
    Properties:
      Queues:
        - !Ref ExternalChannelsToStartReworkRequestLambdaQueueURL
      PolicyDocument:
        Statement:
          - Sid: "SendEventsToDLQ"
            Effect: "Allow"
            Principal:
              Service:
                - "events.amazonaws.com"
            Action:
              - "SQS:SendMessage"
            Resource:
              - !Ref ExternalChannelsToStartReworkRequestLambdaQueueARN

  PnEcEventRuleForwardToCoreArn:
    Condition: IsConfinfoAndNotProd
    Description: 'ARN della regola di forwarding verso Core EventBus'
    Value: !GetAtt PnEcEventRuleForwardToCore.Arn