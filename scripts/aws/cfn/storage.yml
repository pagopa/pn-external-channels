AWSTemplateFormatVersion: '2010-09-09'
Description: Some storage with input and output

Parameters:
  ProjectName:
    Type: String
    Description: Nome dell'ambiente destinazione

  # Unused but required by CD pipeline
  MicroserviceNumber:
    Type: Number
    Description: An unique number that identify the microservice inside the ECS cluster.

  # Unused but required by CD pipeline
  TemplateBucketBaseUrl:
    Type: String
    Description: URL da cui caricare i frammenti di template di infrastruttura

  Version:
    Type: String
    Description: 'keep track of used projects commitIds'

  EnvironmentName:
    Type: String
    Description: 'Evn name'
    Default: 'core'

  EnvironmentType:
    Type: String
    Description: 'Evn type'


Conditions:
  Never: !Equals [ 'true', 'false' ]
  IsNotProdAccount: !Not [ !Equals [ !Ref EnvironmentType, prod ] ]
  IsCoreAccount: !Equals [ !Ref EnvironmentName , 'core' ]
  IsConfinfoAccount: !Equals [ !Ref EnvironmentName , 'confinfo' ]
  IsCoreAndNotProd: !And
    - !Condition IsCoreAccount
    - !Condition IsNotProdAccount
  IsConfinfoAndNotProd: !And
    - !Condition IsConfinfoAccount
    - !Condition IsNotProdAccount

# dummy (null) resource, never created
Resources:
  # NotificationProgress DynamoDB Table for mock
  NotificationProgressTable:
    Type: AWS::DynamoDB::Table
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-ExtChannels'
      AttributeDefinitions:
        - AttributeName: "iun"
          AttributeType: "S"
        - AttributeName: "destinationAddress"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "iun"
          KeyType: "HASH"
        - AttributeName: "destinationAddress"
          KeyType: "RANGE"
      BillingMode: "PAY_PER_REQUEST"
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # Internal queues (creato nel modo standard per compatibilità stack del mock consolidatore)
  InternalQueue:
    Type: AWS::SQS::Queue
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      QueueName: "pn-external_channels_to_internal"
      VisibilityTimeout: 60
      DelaySeconds: 1

  MockOcrInputsQueue:
    Type: AWS::SQS::Queue
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      QueueName: "pn-mock_ocr_inputs"
      VisibilityTimeout: 60
      DelaySeconds: 1

  ExternalChannelsToStartReworkRequestLambdaQueue:
    Type: AWS::CloudFormation::Stack
    Condition: IsCoreAndNotProd
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/sqs-queue.yaml"
      Parameters:
        QueueName: "pn-external_channels_to_start_rework_request_lambda"
        VisibilityTimeout: 60
        DelaySeconds: 720

  VerificationCodeTable:
    Type: AWS::DynamoDB::Table
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-VerificationCode2'
      AttributeDefinitions:
        - AttributeName: "pk"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "pk"
          KeyType: "HASH"
      BillingMode: "PAY_PER_REQUEST"
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  MockEcReceivedMessageTable:
    Type: AWS::DynamoDB::Table
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-MockEcReceivedMessage'
      AttributeDefinitions:
        - AttributeName: "requestId"
          AttributeType: "S"
        - AttributeName: "iunRecIndex"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "requestId"
          KeyType: "HASH"
      GlobalSecondaryIndexes:
        -
          IndexName: "iun-gsi"
          KeySchema:
            -
              AttributeName: "iunRecIndex"
              KeyType: "HASH"
          Projection:
            ProjectionType: "ALL"
      BillingMode: "PAY_PER_REQUEST"
      TimeToLiveSpecification:
        AttributeName: "ttl"
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # DLQ for EventBridge rule forwarding to Core EventBus
  PnEcForwardToCoreDLQueue:
    Type: AWS::SQS::Queue
    Condition: IsConfinfoAndNotProd
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      QueueName: !Sub '${ProjectName}-ext-channels-forward-to-core-DLQ'
      MessageRetentionPeriod: 1209600


Outputs:
  NotificationProgressDynamoTableName:
    Description: Name of dynamodb table containing Notification Progress for mock
    Value: !Ref NotificationProgressTable
  NotificationProgressDynamoTableArn:
    Description: ARN of dynamodb table containing Notification Progress for mock
    Value: !Sub '${NotificationProgressTable.Arn}'
  VerificationCodeTableDynamoTableName:
    Description: Name of dynamodb table containing verification code for mock
    Value: !Ref VerificationCodeTable
  VerificationCodeTableDynamoTableArn:
    Description: ARN of dynamodb table containing verification code for mock
    Value: !Sub '${VerificationCodeTable.Arn}'
  MockEcReceivedMessageTableDynamoTableName:
    Description: Name of dynamodb table containing requests
    Value: !Ref MockEcReceivedMessageTable
  MockEcReceivedMessageTableDynamoTableArn:
    Description: ARN of dynamodb table containing requests
    Value: !Sub '${MockEcReceivedMessageTable.Arn}'

  # Internal Queue
  InternalQueueURL:
    Description: "URL of new Amazon SQS Queue"
    Value:
      Ref: "InternalQueue"
  InternalQueueARN:
    Description: "ARN of new AmazonSQS Queue"
    Value:
      Fn::GetAtt:
        - "InternalQueue"
        - "Arn"
  InternalQueueName:
    Description: "Name of new Amazon SQS Queue"
    Value:
      Fn::GetAtt:
        - "InternalQueue"
        - "QueueName"
  MockOcrInputsQueueARN:
    Description: "ARN of new AmazonSQS Queue"
    Value:
      Fn::GetAtt:
        - "MockOcrInputsQueue"
        - "Arn"
  MockOcrInputsQueueName:
    Description: "Name of new Amazon SQS Queue"
    Value:
      Fn::GetAtt:
        - "MockOcrInputsQueue"
        - "QueueName"

  ExternalChannelsToStartReworkRequestLambdaQueueURL:
    Condition: IsCoreAndNotProd
    Description: "URL of new Amazon SQS Queue"
    Value: !GetAtt ExternalChannelsToStartReworkRequestLambdaQueue.Outputs.QueueURL

  ExternalChannelsToStartReworkRequestLambdaQueueARN:
    Condition: IsCoreAndNotProd
    Description: "ARN of new AmazonSQS Queue"
    Value: !GetAtt ExternalChannelsToStartReworkRequestLambdaQueue.Outputs.QueueARN


  StartReworkRequestLambdaName:
    Condition: IsCoreAndNotProd
    Value: !Sub ${ProjectName}-external-channels-start-rework-request

  PnEcForwardToCoreDLQueueARN:
    Condition: IsConfinfoAndNotProd
    Description: "ARN della DLQ per il forwarding eventi verso Core EventBus"
    Value: !GetAtt PnEcForwardToCoreDLQueue.Arn

  PnEcForwardToCoreDLQueueName:
    Condition: IsConfinfoAndNotProd
    Description: "Nome della DLQ per il forwarding eventi verso Core EventBus"
    Value: !GetAtt PnEcForwardToCoreDLQueue.QueueName
